# Training config for VQA-GNN on VCR QA→R task (arXiv:2205.11501).
# This is a PAPER-ALIGNED config. See GAP_ANALYSIS.md for deviations.
#
# QA→R task: given image + question + correct answer, choose correct rationale.
# The context node encodes [question; correct_answer; candidate_rationale_j].
#
# NOTE: The Q→AR metric requires BOTH a Q→A model and a QA→R model.
#       Train this config separately from baseline_vcr_qa.yaml.
#       Then compute Q→AR = joint accuracy (see README.md).
#
# Default: DEMO mode (synthetic data, no real VCR data needed).
# For real VCR training override: datasets=vcr_qar
#
# Commands:
#   Demo smoke-test (QA→R):
#     python train.py --config-name baseline_vcr_qar
#
#   Real VCR QA→R training:
#     python train.py --config-name baseline_vcr_qar \
#       datasets=vcr_qar \
#       datasets.train.data_dir=data/vcr \
#       datasets.val.data_dir=data/vcr

defaults:
  - model: vqa_gnn_vcr
  - writer: cometml
  - metrics: vcr_qar
  - datasets: vcr_demo_qar      # change to 'vcr_qar' for real data
  - dataloader: vcr
  - transforms: vqa
  - _self_

writer:
  project_name: "vqa_gnn"
  run_name: "vcr_qar_baseline"

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-5
  weight_decay: 1e-2

lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.5
  step_size: ${trainer.epoch_len}

loss_function:
  _target_: src.loss.VCRLoss

trainer:
  log_step: 20
  progress_bar: on
  n_epochs: 10
  epoch_len: 1000
  device_tensors:
    - "visual_features"
    - "question_input_ids"
    - "question_attention_mask"
    - "graph_node_features"
    - "graph_adj"
    - "graph_node_types"
    - "answer_label"
  resume_from: null
  device: auto
  override: False
  monitor: "max val_VCR_QAR_Accuracy"
  save_period: 2
  early_stop: 5
  save_dir: "saved"
  seed: 42
  skip_oom: True
  max_grad_norm: 1.0
