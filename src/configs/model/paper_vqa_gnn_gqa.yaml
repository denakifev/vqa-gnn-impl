_target_: src.model.PaperGQAModel

# Paper-equation GQA architecture path (arXiv:2205.11501 §4.1-§4.3, §5.1 GQA).
#
# Runtime status: end-to-end runnable via the two-subgraph batch contract
# emitted by `GQADataset(emit_two_subgraphs=True)` and stacked by
# `gqa_paper_collate_fn`. Used by `paper_vqa_gnn_gqa.yaml` (training) and
# `inference_paper_gqa.yaml` (inference).
#
# Pair vs. `vqa_gnn_gqa.yaml` (`GQAVQAGNNModel`):
#   - `GQAVQAGNNModel`: merged graph + relation-aware DenseGAT bias.
#     Faster, paper-aligned approximation. Default runtime path
#     (baseline_gqa.yaml).
#   - `PaperGQAModel` (this config): two-subgraph layout with
#     `PaperMultiRelationGATLayer` (paper Eqs 1-6) and concat readout
#     (Eqs 7-9). Equation-faithful; numerically slower per epoch.
# Use whichever the experiment requires; both consume the same strict
# GQA package on disk.

d_visual: 2048

# Paper §5.1 GQA: textual SG nodes concatenate GloVe(object) and GloVe(attribute).
d_kg: 600

d_hidden: 1024

# Paper does not restate L for GQA. We keep L=5 to mirror the VCR setting and
# document this as not paper-faithful yet until confirmed.
num_gnn_layers: 5

# Paper does not specify whether visual SG and textual SG share or split
# the relation vocabulary. We use the single shared vocabulary produced by
# `scripts/prepare_gqa_data.py relation-vocab` (relation_count_total=624 in
# the validated strict package: 4 specials + 2 × 310 predicates). Each
# `PaperMultiRelationGATLayer` validates that incoming edge ids are
# strictly less than its own `num_relations`, so both must cover 624.
num_relations_visual: 624
num_relations_textual: 624

# Paper §5.1 GQA: 1,842 answer classes.
num_answers: 1842

dropout: 0.0

text_encoder_name: "roberta-large"
freeze_text_encoder: False
