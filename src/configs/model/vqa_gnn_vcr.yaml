_target_: src.model.VCRVQAGNNModel

# Visual feature dimension (bottom-up / R2C features: 2048)
d_visual: 2048

# KG node feature dimension.
# MUST MATCH: d_kg in vcr*.yaml dataset configs
#             AND --d-kg used in scripts/prepare_vcr_data.py
d_kg: 300

# Hidden dimension (matches RoBERTa-large: 1024)
d_hidden: 1024

# Number of dense GAT layers (paper: 3)
num_gnn_layers: 3

# Attention heads per GAT layer
num_heads: 8

# NOTE: num_answers is NOT a parameter for VCRVQAGNNModel.
# VCR is a candidate-scoring task: the model always outputs one scalar
# score per candidate item (output dim = 1). This is not configurable
# because candidate scoring and vocabulary classification are different
# output regimes. See src/model/vcr_model.py for the full explanation.
#
# The VCR collate expands B→B×4 and the model outputs one score per
# expanded item. VCRLoss reshapes [B*4, 1] → [B, 4] and applies
# cross-entropy.

# Dropout rate
dropout: 0.1

# Text encoder: RoBERTa-large (paper-aligned default).
# For VCR, the encoder input is [question; candidate_answer] or
# [question; answer; candidate_rationale], tokenized jointly.
text_encoder_name: "roberta-large"
freeze_text_encoder: False
