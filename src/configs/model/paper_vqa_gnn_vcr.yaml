_target_: src.model.PaperVCRModel

# Paper-equation VCR architecture path.
# This config composes but is not runnable with the current VCRDataset batch
# contract. It requires the split scene/concept subgraph contract documented in
# GAP_ANALYSIS.md.

d_visual: 2048

# Paper §4.1 states 1024-d concept entity embeddings from Feng et al. [8].
d_kg: 1024

# D is not stated explicitly; 1024 matches RoBERTa-large hidden width and the
# paper's 1024-d concept-entity statement.
d_hidden: 1024

# Paper §5.1 VCR: L = 5.
num_gnn_layers: 5

# Relation vocab sizes are placeholders until exact paper-path graph artifacts
# are rebuilt. They must be >= max edge id in the split subgraph tensors.
num_relations_scene: 64
num_relations_concept: 64

# Paper does not specify dropout; keep it off on the strict architecture path.
dropout: 0.0

text_encoder_name: "roberta-large"
freeze_text_encoder: False
