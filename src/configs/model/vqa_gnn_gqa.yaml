_target_: src.model.VQAGNNModel

# Visual feature dimension (bottom-up / GQA features: 2048)
d_visual: 2048

# KG node feature dimension.
# MUST MATCH: d_kg in gqa*.yaml dataset configs
#             AND --d-kg used in scripts/prepare_gqa_data.py
d_kg: 300

# Hidden dimension (matches RoBERTa-large: 1024)
d_hidden: 1024

# Number of dense GAT layers (paper: 3)
num_gnn_layers: 3

# Attention heads per GAT layer
num_heads: 8

# GQA balanced split answer vocabulary size.
# Build with: python scripts/prepare_gqa_data.py --build-vocab
# Default: 1852 (GQA balanced split standard answer space).
# Deviation from paper: exact answer vocab construction not disclosed; this
# count follows the standard GQA balanced split evaluation protocol.
num_answers: 1852

# Dropout rate
dropout: 0.1

# Text encoder (RoBERTa-large, paper-aligned default)
text_encoder_name: "roberta-large"
freeze_text_encoder: False
