_target_: src.model.GQAVQAGNNModel

# Visual feature dimension (bottom-up / GQA features: 2048)
d_visual: 2048

# Textual scene-graph node feature dimension.
# MUST MATCH: d_kg in gqa*.yaml dataset configs
#             AND --d-kg used in scripts/prepare_gqa_data.py
d_kg: 600

# Hidden dimension (matches RoBERTa-large: 1024)
d_hidden: 1024

# Number of dense GAT layers (paper: 3)
num_gnn_layers: 3

# Attention heads per GAT layer
num_heads: 8

# GQA answer vocabulary size for the paper-aligned setup.
# GQA is an open-ended classification task: the model outputs a
# distribution over num_answers classes (no candidate expansion).
# This is fundamentally different from VCR (candidate scoring, output dim=1).
#
# Build with: python scripts/prepare_gqa_data.py answer-vocab \
#   --questions train_balanced_questions.json val_balanced_questions.json \
#   --output-vocab data/gqa/gqa_answer_vocab.json \
#   --target-size 1842
#
# Paper target: 1842 answer classes.
num_answers: 1842

# Size of the typed-edge vocabulary used by relation-aware GNN message
# passing. Must be >= relation_count_total produced by:
#   scripts/prepare_gqa_data.py relation-vocab
# The strict GQA package validated against this repo (uploaded to Kaggle)
# stores `graph_edge_type_count = 624` (4 specials + 2 * 310 predicates).
# `DenseGATLayer` raises ValueError at forward() if any edge id in the
# batch is >= num_relations, so this bound MUST cover the runtime vocab
# or training/inference will crash on the first batch.
# After restoring a private Kaggle package, override `model.num_relations`
# to the value reported by `gqa_relation_vocab.json::relation_count_total`
# if it differs.
# Setting 0 disables relation awareness (ablation only; not paper-faithful).
num_relations: 624

# Dropout rate
dropout: 0.1

# Text encoder (RoBERTa-large, paper-aligned default)
text_encoder_name: "roberta-large"
freeze_text_encoder: False

# Relation awareness:
# GQAVQAGNNModel consumes `graph_edge_types` through every dense GAT
# layer via a learned per-(head, relation) scalar attention bias.
# See src/model/gqa_model.py and src/model/gnn_core.py for details.
