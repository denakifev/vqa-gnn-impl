# VCR Q→A dataset configuration for VQA-GNN training.
#
# task_mode: 'qa' — context node encodes [question; candidate_answer_i]
#
# Required directory layout:
#   ${data_dir}/train.jsonl
#   ${data_dir}/val.jsonl
#   ${data_dir}/visual_features/{train,val}_features.h5  # HDF5: img_fn → float32[N_v, d_visual]
#   ${data_dir}/knowledge_graphs/{train,val}_graphs.h5   # HDF5: annot_id → {node_features,...}
#
# Prepare data with: python scripts/prepare_vcr_data.py

train:
  _target_: src.datasets.VCRDataset
  partition: "train"
  data_dir: "data/vcr"                  # override for Kaggle: /kaggle/input/vcr-gnn-data
  task_mode: "qa"
  max_context_len: 64
  num_visual_nodes: 36
  max_kg_nodes: 30
  d_visual: 2048
  # d_kg must match: src/configs/model/vqa_gnn_vcr.yaml (d_kg)
  #                  AND --d-kg used in scripts/prepare_vcr_data.py
  d_kg: 300
  text_encoder_name: "roberta-large"
  instance_transforms: ${transforms.instance_transforms.train}
  shuffle_index: True

val:
  _target_: src.datasets.VCRDataset
  partition: "val"
  data_dir: "data/vcr"
  task_mode: "qa"
  max_context_len: 64
  num_visual_nodes: 36
  max_kg_nodes: 30
  d_visual: 2048
  d_kg: 300
  text_encoder_name: "roberta-large"
  instance_transforms: ${transforms.instance_transforms.inference}
