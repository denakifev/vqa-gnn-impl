# GQA demo dataset (synthetic) for smoke testing.
# DOES NOT reproduce any paper result.

train:
  _target_: src.datasets.GQADemoDataset
  num_samples: 64
  num_answers: 1852
  max_question_len: 30
  num_visual_nodes: 36
  max_kg_nodes: 30
  d_visual: 2048
  d_kg: 300  # must match vqa_gnn_gqa.yaml d_kg
  seed: 42

val:
  _target_: src.datasets.GQADemoDataset
  num_samples: 32
  num_answers: 1852
  max_question_len: 30
  num_visual_nodes: 36
  max_kg_nodes: 30
  d_visual: 2048
  d_kg: 300  # must match vqa_gnn_gqa.yaml d_kg
  seed: 0
