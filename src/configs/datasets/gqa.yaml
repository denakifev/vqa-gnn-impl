# GQA balanced-split dataset configuration for VQA-GNN training.
#
# Required directory layout:
#   ${data_dir}/questions/train_balanced_questions.json
#   ${data_dir}/questions/val_balanced_questions.json
#   ${data_dir}/visual_features/{train,val}_features.h5  # HDF5: imageId → float32[N_v, d_visual]
#   ${data_dir}/knowledge_graphs/{train,val}_graphs.h5   # HDF5: question_id → {node_features,...}
#   ${answer_vocab_path}   # {"answer_to_idx": {"yes": 0, ...}}
#
# Prepare data with:
#   python scripts/prepare_gqa_data.py prepare-all ...
# or lower-level commands:
#   python scripts/prepare_gqa_data.py answer-vocab ...
#   python scripts/prepare_gqa_data.py knowledge-graphs ...
#   python scripts/prepare_gqa_data.py visual-features ...

train:
  _target_: src.datasets.GQADataset
  partition: "train"
  data_dir: "data/gqa"
  answer_vocab_path: "data/gqa/gqa_answer_vocab.json"
  max_question_len: 30
  num_visual_nodes: 100
  max_kg_nodes: 100
  d_visual: 2048
  # d_kg must match: src/configs/model/vqa_gnn_gqa.yaml (d_kg)
  # 600 = DEFAULT_GLOVE_DIM (300) * 2 produced by the current paper-aligned
  # scene-graph pipeline in scripts/prepare_gqa_data.py.
  # Legacy artifacts may be 300-d; see DATA_CONTRACTS.md for how to opt in.
  d_kg: 600
  text_encoder_name: "roberta-large"
  instance_transforms: ${transforms.instance_transforms.train}
  limit: null
  shuffle_index: True
  shuffle_seed: 42
  # Data-contract toggles. Defaults match the paper-aligned pipeline.
  #
  # expect_graph_edge_types=True  → graph HDF5 must carry `graph_edge_types`
  #                                 (typed scene-graph relations).
  # strict_graph_schema=True      → probe first sample on first HDF5 open and fail fast
  #                                 on d_kg mismatch / missing edge types /
  #                                 missing required datasets.
  #
  # Set `expect_graph_edge_types: False` to explicitly accept older artifacts
  # that predate typed edges. See DATA_CONTRACTS.md.
  expect_graph_edge_types: True
  strict_graph_schema: True

val:
  _target_: src.datasets.GQADataset
  partition: "val"
  data_dir: "data/gqa"
  answer_vocab_path: "data/gqa/gqa_answer_vocab.json"
  max_question_len: 30
  num_visual_nodes: 100
  max_kg_nodes: 100
  d_visual: 2048
  d_kg: 600
  text_encoder_name: "roberta-large"
  instance_transforms: ${transforms.instance_transforms.inference}
  # Kaggle-practical validation subset. Set to null for a full val pass.
  limit: 10000
  shuffle_index: False
  shuffle_seed: 42
  expect_graph_edge_types: True
  strict_graph_schema: True
