# Paper-protocol GQA config for arXiv:2205.11501 audit.
#
# Status: `not paper-faithful yet` for end-to-end runtime because current GQA
# artifacts do not emit separate visual/textual SG subgraphs with q-node ids.

defaults:
  - model: paper_vqa_gnn_gqa
  - writer: cometml
  - metrics: gqa
  - datasets: gqa_demo
  - dataloader: gqa
  - transforms: vqa
  - _self_

writer:
  project_name: "vqa_gnn"
  run_name: "paper_vqa_gnn_gqa_audit"

optimizer_param_groups:
  _target_: src.optim.paper_param_groups
  lm_lr: 2e-5
  other_lr: 2e-4

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-4
  weight_decay: 1e-2

lr_scheduler:
  _target_: src.lr_schedulers.PaperWarmupCosine
  # GQA §5.1 states 50 epochs and two LRs, but does not restate warmup length.
  # Reusing VCR's 15-epoch warmup is documented as `not paper-faithful yet`.
  warmup_steps: 75000
  total_steps: 250000

loss_function:
  _target_: src.loss.GQALoss

trainer:
  log_step: 20
  progress_bar: on
  n_epochs: 50
  epoch_len: 5000
  device_tensors:
    - "question_input_ids"
    - "question_attention_mask"
    - "visual_node_features"
    - "visual_adj"
    - "visual_edge_types"
    - "visual_node_types"
    - "visual_node_is_q_index"
    - "textual_node_features"
    - "textual_adj"
    - "textual_edge_types"
    - "textual_node_types"
    - "textual_node_is_q_index"
    - "labels"
  resume_from: null
  device: auto
  override: False
  monitor: "max val_GQA_Accuracy"
  save_period: 5
  early_stop: 10
  save_dir: "saved"
  seed: 42
  skip_oom: True
  max_grad_norm: 1.0
