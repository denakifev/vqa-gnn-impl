# Inference config for the paper-equation GQA path (`PaperGQAModel`).
#
# Commands:
#   Demo smoke-test (no checkpoint needed):
#     python inference.py --config-name inference_paper_gqa \
#       inferencer.skip_model_load=True
#
#   Real GQA inference:
#     python inference.py --config-name inference_paper_gqa \
#       datasets=gqa_paper_eval \
#       datasets.val.data_dir=data/gqa \
#       datasets.val.answer_vocab_path=data/gqa/gqa_answer_vocab.json \
#       inferencer.from_pretrained=saved/paper_vqa_gnn_gqa_audit/model_best.pth

defaults:
  - model: paper_vqa_gnn_gqa
  - metrics: gqa
  - datasets: gqa_paper_demo
  - dataloader: gqa
  - transforms: vqa
  - _self_

inferencer:
  device_tensors:
    - "question_input_ids"
    - "question_attention_mask"
    - "visual_node_features"
    - "visual_adj"
    - "visual_edge_types"
    - "visual_node_types"
    - "visual_node_is_q_index"
    - "textual_node_features"
    - "textual_adj"
    - "textual_edge_types"
    - "textual_node_types"
    - "textual_node_is_q_index"
    - "labels"
  device: auto
  save_path: "gqa_paper_preds"
  seed: 42
  from_pretrained: "saved/paper_vqa_gnn_gqa_audit/model_best.pth"
  skip_model_load: False
