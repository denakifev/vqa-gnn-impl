# Paper-protocol VCR config for arXiv:2205.11501 audit.
#
# Status: `not paper-faithful yet` for end-to-end runtime because current VCR
# data artifacts do not emit the split scene/concept subgraph contract, VinVL
# p-node features, or paper ConceptNet embeddings. Use this config for Hydra
# composition and architecture audit, not for current smoke training.

defaults:
  - model: paper_vqa_gnn_vcr
  - writer: cometml
  - metrics: vcr_qa
  - datasets: vcr_demo
  - dataloader: vcr
  - transforms: vqa
  - _self_

writer:
  project_name: "vqa_gnn"
  run_name: "paper_vqa_gnn_vcr_audit"

optimizer_param_groups:
  _target_: src.optim.paper_param_groups
  lm_lr: 1e-5
  other_lr: 1e-4

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-4
  weight_decay: 1e-2

lr_scheduler:
  _target_: src.lr_schedulers.PaperWarmupCosine
  # Paper §5.1: 50 epochs, 15-epoch linear warmup, cosine decay to 0.
  # This repository's trainer is step-based when epoch_len is set, so this
  # config encodes 1000 steps/epoch for audit composition only.
  warmup_steps: 15000
  total_steps: 50000

loss_function:
  _target_: src.loss.VCRLoss

trainer:
  log_step: 20
  progress_bar: on
  n_epochs: 50
  epoch_len: 1000
  device_tensors:
    - "question_input_ids"
    - "question_attention_mask"
    - "p_features"
    - "scene_node_features"
    - "scene_adj"
    - "scene_edge_types"
    - "scene_node_types"
    - "scene_node_is_z_index"
    - "concept_node_features"
    - "concept_adj"
    - "concept_edge_types"
    - "concept_node_types"
    - "concept_node_is_z_index"
    - "answer_label"
  resume_from: null
  device: auto
  override: False
  monitor: "max val_VCR_QA_Accuracy"
  save_period: 5
  early_stop: 10
  save_dir: "saved"
  seed: 42
  skip_oom: True
  max_grad_norm: 1.0
