# Training config for VQA-GNN on VCR Q→A task (arXiv:2205.11501).
# This is a PAPER-ALIGNED config. See GAP_ANALYSIS.md for deviations.
#
# Q→A task: given image + question, choose correct answer from 4 candidates.
#
# Default: DEMO mode (synthetic data, no real VCR data needed).
# For real VCR training override: datasets=vcr_qa
#
# Commands:
#   Demo smoke-test (Q→A):
#     python train.py --config-name baseline_vcr_qa
#
#   Real VCR Q→A training:
#     python train.py --config-name baseline_vcr_qa \
#       datasets=vcr_qa \
#       datasets.train.data_dir=data/vcr \
#       datasets.val.data_dir=data/vcr
#
#   Kaggle (Q→A):
#     python train.py --config-name baseline_vcr_qa \
#       datasets=vcr_qa \
#       datasets.train.data_dir=/kaggle/input/vcr-gnn-data \
#       datasets.val.data_dir=/kaggle/input/vcr-gnn-data \
#       trainer.save_dir=/kaggle/working/saved

defaults:
  - model: vqa_gnn_vcr
  - writer: cometml
  - metrics: vcr_qa
  - datasets: vcr_demo         # change to 'vcr_qa' for real data
  - dataloader: vcr
  - transforms: vqa            # null instance transforms (reuse vqa transforms config)
  - _self_

writer:
  project_name: "vqa_gnn"
  run_name: "vcr_qa_baseline"

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-5
  weight_decay: 1e-2

lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.5
  step_size: ${trainer.epoch_len}

loss_function:
  _target_: src.loss.VCRLoss

trainer:
  log_step: 20
  progress_bar: on
  n_epochs: 10
  # Each "epoch" is epoch_len gradient steps (iteration-based training).
  # With batch_size=8 and B×4=32 effective forward passes, and VCR train ~213K
  # questions, one real epoch ≈ 213000/8 = 26625 steps.
  epoch_len: 1000
  # VCR tensor keys — answer_label (compact B) and question_input_ids are
  # provided by vcr_collate_fn (question_input_ids = expanded QA context).
  device_tensors:
    - "visual_features"
    - "question_input_ids"
    - "question_attention_mask"
    - "graph_node_features"
    - "graph_adj"
    - "graph_node_types"
    - "answer_label"
  resume_from: null
  device: auto
  override: False
  monitor: "max val_VCR_QA_Accuracy"
  save_period: 2
  early_stop: 5
  save_dir: "saved"
  seed: 42
  skip_oom: True
  max_grad_norm: 1.0
