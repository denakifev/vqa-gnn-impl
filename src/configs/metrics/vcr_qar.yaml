# Metrics for VCR QA→R training and evaluation.
# QA→R accuracy: fraction of questions with correct top-1 rationale candidate.
# Note: answer_label in QA→R batches contains rationale_label (renamed by collate).

device: "auto"

train:
  - _target_: src.metrics.VCRQARAccuracy
    name: "VCR_QAR_Accuracy"

inference:
  - _target_: src.metrics.VCRQARAccuracy
    name: "VCR_QAR_Accuracy"
