# Inference config for VCR Q→A with VQA-GNN (arXiv:2205.11501).
#
# Runs inference on the val split and saves per-sample predictions.
# Outputs: data/saved/<save_path>/val/output_*.pth
# Each file contains: {"pred_label": int, "answer_label": int, "annot_id": str}
#
# Commands:
#   Demo smoke-test (no real data or checkpoint needed):
#     python inference.py --config-name inference_vcr \
#       inferencer.skip_model_load=True
#
#   Real VCR Q→A inference:
#     python inference.py --config-name inference_vcr \
#       datasets=vcr_qa \
#       datasets.val.data_dir=data/vcr \
#       inferencer.from_pretrained=saved/vcr_qa_baseline/model_best.pth
#
#   VCR QA→R inference (override model and datasets):
#     python inference.py --config-name inference_vcr \
#       model=vqa_gnn_vcr \
#       datasets=vcr_qar \
#       metrics=vcr_qar \
#       datasets.val.data_dir=data/vcr \
#       inferencer.from_pretrained=saved/vcr_qar_baseline/model_best.pth \
#       inferencer.save_path=vcr_qar_preds

defaults:
  - model: vqa_gnn_vcr
  - metrics: vcr_qa
  - datasets: vcr_demo          # change to 'vcr_qa' for real data
  - dataloader: vcr
  - transforms: vqa
  - _self_

inferencer:
  device_tensors:
    - "visual_features"
    - "question_input_ids"
    - "question_attention_mask"
    - "graph_node_features"
    - "graph_adj"
    - "graph_node_types"
    - "answer_label"
  device: auto
  save_path: "vcr_qa_preds"
  seed: 42
  from_pretrained: "saved/vcr_qa_baseline/model_best.pth"
