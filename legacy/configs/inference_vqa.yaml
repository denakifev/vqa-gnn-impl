# Inference config for VQA-GNN (arXiv:2205.11501).
#
# Runs inference on the val split and saves per-sample predictions.
# Predicted outputs are saved to data/saved/<save_path>/val/output_*.pth
# Each file contains: {"pred_label": int, "label": int}
#
# Example commands:
#   Demo smoke-test (no real data or checkpoint needed):
#     python inference.py --config-name inference_vqa \
#       inferencer.skip_model_load=True
#
#   Real VQA v2 inference with trained checkpoint:
#     python inference.py --config-name inference_vqa datasets=vqa_eval \
#       datasets.val.data_dir=/path/to/vqa \
#       datasets.val.answer_vocab_path=/path/to/vqa/answer_vocab.json \
#       inferencer.from_pretrained=saved/vqa_gnn_run/model_best.pth
#
# Kaggle:
#   python inference.py --config-name inference_vqa datasets=vqa_eval \
#     datasets.val.data_dir=/kaggle/input/vqa-gnn-data \
#     datasets.val.answer_vocab_path=/kaggle/input/vqa-gnn-data/answer_vocab.json \
#     inferencer.from_pretrained=/kaggle/input/vqa-gnn-ckpt/model_best.pth \
#     inferencer.save_path=vqa_preds

defaults:
  - model: vqa_gnn
  - metrics: vqa
  - datasets: vqa_demo_eval   # change to 'vqa_eval' for real data
  - dataloader: vqa
  - transforms: vqa
  - _self_

inferencer:
  device_tensors:
    - "visual_features"
    - "question_input_ids"
    - "question_attention_mask"
    - "graph_node_features"
    - "graph_adj"
    - "graph_node_types"
    - "answer_scores"
    - "labels"
  device: auto
  save_path: "vqa_preds"
  seed: 42
  # Default: looks for checkpoint from the demo training run.
  # Override for real experiments or Kaggle.
  from_pretrained: "saved/vqa_gnn_baseline/model_best.pth"
